name: CI

on:
  push:
    paths:
      - "api/**"
      - ".github/workflows/ci.yml"
  pull_request: # no path filter — workflow always runs so api-ci is always present

defaults:
  run:
    working-directory: api

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: api/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

  typecheck:
    name: Mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: api/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Type check
        run: mypy .

  test:
    name: Pytest
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/claridge_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: api/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest

  api-ci:
    name: API CI
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    if: always()
    steps:
      - name: All jobs passed or were skipped
        run: |
          has_failure="${{ contains(needs.*.result, 'failure') }}"
          has_cancelled="${{ contains(needs.*.result, 'cancelled') }}"
          if [[ "$has_failure" == "true" || "$has_cancelled" == "true" ]]; then
            exit 1
          fi
